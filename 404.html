<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada · n4flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#F07B2B;--orange-dark:#D96A1F;--orange-light:#F59D5E;
  --dark:#17191F;--charcoal:#3D3D3D;
  --g400:#999;--g200:#E0E0E0;
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .7s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.fd1{animation-delay:.15s}.fd2{animation-delay:.3s}.fd3{animation-delay:.45s}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:.9rem 2.5rem;
  display:flex;align-items:center;justify-content:center;
  background:rgba(23,25,31,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.nav-logo{font-size:1.4rem;font-weight:800;letter-spacing:-.03em;text-decoration:none}
.nav-logo .n4{color:var(--orange)}.nav-logo .flow{color:rgba(255,255,255,.5)}

.page{
  min-height:100vh;
  background:linear-gradient(155deg,#1A1D24 0%,#0F1117 55%,#1A1D24 100%);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:80px 2rem 4rem;
}
.page::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 55% at 50% 45%,rgba(240,123,43,.1) 0%,transparent 65%);
  pointer-events:none;
}
.page::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(240,123,43,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,123,43,.025) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;
}
.card{
  position:relative;z-index:2;text-align:center;
  max-width:520px;width:100%;
}
.code{
  font-family:var(--mono);font-size:.78rem;
  color:rgba(240,123,43,.75);
  letter-spacing:.15em;text-transform:uppercase;
  margin-bottom:1.2rem;
}
h1{
  font-size:clamp(3rem,9vw,5rem);
  font-weight:800;letter-spacing:-.04em;line-height:1;
  color:#fff;margin-bottom:1.1rem;
}
h1 .acc{
  background:linear-gradient(90deg,#F07B2B,#F59D5E);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sub{
  font-size:1rem;color:rgba(255,255,255,.5);line-height:1.7;
  max-width:420px;margin:0 auto 2rem;
}
.home-btn{
  display:inline-flex;align-items:center;gap:.55rem;
  padding:.95rem 1.8rem;
  background:var(--orange);color:#fff;
  font-size:.95rem;font-weight:700;
  border-radius:10px;text-decoration:none;
  transition:all .25s;
}
.home-btn:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 12px 40px rgba(240,123,43,.3)}
.home-btn svg{width:16px;height:16px}
footer{
  background:#0B0D11;padding:1.8rem 2rem;text-align:center;
  border-top:1px solid rgba(255,255,255,.04);
}
footer .nav-logo{font-size:1.05rem;display:inline-block;margin-bottom:.4rem}
footer .nav-logo .flow{color:rgba(255,255,255,.22)}
footer p{font-size:.7rem;color:rgba(255,255,255,.16);font-family:var(--mono);margin-top:.25rem}
@media(max-width:560px){nav{padding:.75rem 1.2rem}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><span class="n4">n4</span><span class="flow">flow</span></a>
</nav>
<div class="page">
  <div class="card">
    <div class="code fade-up">ERRO 404 · PÁGINA NÃO ENCONTRADA</div>
    <h1 class="fade-up fd1">Esse <span class="acc">fluxo</span><br>deu nó.</h1>
    <p class="sub fade-up fd2">A página que você procurou não existe ou foi movida. Vamos te levar de volta ao começo.</p>
    <a href="/" class="home-btn fade-up fd3">
      Voltar ao início
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
  </div>
</div>
<footer>
  <a href="/" class="nav-logo"><span class="n4">n4</span><span class="flow">flow</span></a>
  <p>IA, Dados &amp; Automação aplicados ao que trava o crescimento da sua empresa.</p>
  <p>São Paulo, SP · Atendimento em todo o Brasil</p>
</footer>
</body>
</html>
